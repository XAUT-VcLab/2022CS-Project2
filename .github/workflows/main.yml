name: Sync from Personal Fork

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull from personal fork
        run: |
          git remote add fork https://github.com/chen114514sheng/ProDecTalk3D.git
          git fetch fork main
          # 使用 -X theirs 自动采用个人 fork 的版本解决冲突
          git merge fork/main --allow-unrelated-histories --no-edit -X theirs -m "Sync from personal fork"
          git push origin main
